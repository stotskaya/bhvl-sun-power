<section class="py-20 px-6" id="specs">
    <div class="max-w-7xl mx-auto reveal visible">
         {{ with .title }}
        <h2 class="text-4xl font-light text-center mb-14 tracking-tight reveal visible">
            {{ . | safeHTML }}
        </h2>
        {{ end }}
         <div class="grid lg:grid-cols-3 gap-10 items-center">
            <div class="lg:col-span-2 glass-card rounded-[2.5rem] p-6 md:p-10">
                <h3 class="font-light text-2xl mb-5 max-w-[80%]">
                    {{ .subtitle }}
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    {{ range .specs }}
                    <div class="glass-panel rounded-2xl p-6 flex flex-col align-start">
                        <span class="text-xs text-gray-400 tracking-widest uppercase">{{ .label }}</span>
                        <div class="text-sm font-regular mt-3 leading-relaxed">
                            {{ .value | safeHTML }}
                        </div>
                    </div>
                    {{ end }}
                </div>
                
                <button class="bg-gray-900 text-white px-10 py-4 rounded-full font-medium hover:bg-gray-800 transition-all shadow-lg shadow-gray-200 w-full mt-6"
                data-name="{{ .Title }}" data-category="{{ .Params.Short_title }}"  data-desc="{{ .Params.description }}" data-img="{{ .Params.image }}">
                    {{ .button_text }}
                </button>
            </div>

         <div class="reveal visible {{ if eq .image_position "left" }} lg:order-first {{ else }} lg:order-last {{ end }}" style="height: 100%;">
            <div class="glass-panel rounded-[2.5rem] overflow-hidden shadow-sm section-image" style="height: 100%;">
                <img src="{{ .image | absURL }}" alt="{{ .image_alt }}" class="solar-img w-full h-full object-cover" style="border-radius:2.5rem">
            </div>
        </div>
        </div>
    </div>
</section>
