<section class="py-20 px-6">
    <div class="max-w-3xl mx-auto">
        {{ with .title }}
        <h2 class="text-4xl font-light text-center mb-14 tracking-tight reveal visible">
            {{ . }}
        </h2>
        {{ end }}

        <div class="reveal visible">
            {{ range $index, $item := .items }}
            
            <details class="faq-item group" {{ if eq $index 0 }}open{{ end }}>
                <summary class="flex items-center justify-between cursor-pointer list-none py-4 text-gray-900 font-medium transition-all">
                    <span class="pr-4 font-medium text-sm">
                         {{ .question }}
                    </span>
                    
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 flex-shrink-0 text-gray-400 transition-transform duration-300 group-open:rotate-180">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </summary>
                
                <p class="faq-content">
                    {{ .answer | markdownify }}
                </p>
            </details>
            
            {{ if lt (add $index 1) (len $.items) }}
            <hr class="border-gray-100">
            {{ end }}

            {{ end }}
        </div>
    </div>
</section>
