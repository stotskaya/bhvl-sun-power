<section id="contact" class="py-32 px-6">
    <div class="max-w-5xl mx-auto glass-panel rounded-[4rem] p-12 md:p-24 reveal text-center">
        <h2 class="text-4xl font-light mb-6">{{ .Title }}</h2>
        <p class="text-gray-500 font-light mb-16 max-w-lg mx-auto">{{ .Params.subtitle }}</p>
        
        <div class="grid md:grid-cols-3 gap-12 text-center">
            <div>
                <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="phone" class="w-5 h-5 text-gray-400"></i>
                </div>
                <p class="text-sm text-gray-400 uppercase tracking-widest mb-2">Speak With Us</p>
                <p class="text-lg font-medium">{{ .Params.phone }}</p>
            </div>
            <div>
                <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="mail" class="w-5 h-5 text-gray-400"></i>
                </div>
                <p class="text-sm text-gray-400 uppercase tracking-widest mb-2">Write to Us</p>
                <p class="text-lg font-medium">{{ .Params.email }}</p>
            </div>
            <div>
                <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="map-pin" class="w-5 h-5 text-gray-400"></i>
                </div>
                <p class="text-sm text-gray-400 uppercase tracking-widest mb-2">Visit Studio</p>
                <p class="text-lg font-medium">{{ .Params.address }}</p>
            </div>
        </div>

        <div class="mt-16 max-w-3xl mx-auto text-left">
            <div class="glass-card p-6 md:p-10 rounded-[2.5rem]">
                <form id="contact-form" novalidate class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label for="contact-name" class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-amber-600">*</span></label>
                            <input id="contact-name" name="name" type="text" required autocomplete="name" class="w-full px-5 py-4 rounded-2xl bg-white/90 border border-gray-200/80 shadow-sm shadow-gray-900/5 text-gray-900 placeholder:text-gray-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300/70 focus:border-amber-200 focus:bg-white">
                        </div>
                        <div>
                            <label for="contact-email" class="block text-sm font-medium text-gray-700 mb-2">Email <span class="text-amber-600">*</span></label>
                            <input id="contact-email" name="email" type="email" required autocomplete="email" inputmode="email" class="w-full px-5 py-4 rounded-2xl bg-white/90 border border-gray-200/80 shadow-sm shadow-gray-900/5 text-gray-900 placeholder:text-gray-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300/70 focus:border-amber-200 focus:bg-white">
                        </div>
                    </div>

                    <div>
                        <label for="contact-subject" class="block text-sm font-medium text-gray-700 mb-2">Subject <span class="text-amber-600">*</span></label>
                        <input id="contact-subject" name="subject" type="text" required class="w-full px-5 py-4 rounded-2xl bg-white/90 border border-gray-200/80 shadow-sm shadow-gray-900/5 text-gray-900 placeholder:text-gray-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300/70 focus:border-amber-200 focus:bg-white">
                    </div>

                    <div>
                        <label for="contact-message" class="block text-sm font-medium text-gray-700 mb-2">Message <span class="text-amber-600">*</span></label>
                        <textarea id="contact-message" name="message" rows="6" required class="w-full px-5 py-4 rounded-2xl bg-white/90 border border-gray-200/80 shadow-sm shadow-gray-900/5 text-gray-900 placeholder:text-gray-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300/70 focus:border-amber-200 focus:bg-white resize-none"></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between">
                        <button id="contact-submit" type="submit" class="bg-gray-900 text-white px-10 py-4 rounded-full font-medium hover:bg-gray-800 transition-all shadow-lg shadow-gray-200">
                            {{ .Params.submit_text }}
                        </button>
                        <p class="text-xs text-gray-400 tracking-wide">Fields marked with <span class="text-amber-600">*</span> are required.</p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
