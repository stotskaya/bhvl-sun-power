<section class="py-20 px-6 relative z-10">
  <div class="max-w-7xl mx-auto">

    <!-- Заголовок -->
    <div class="text-center">
        {{ with  .title }}
        <h2 class="text-3xl md:text-4xl font-light text-center mb-16">
            {{ $title := . }}
            {{ $words := split $title " " }}

            <span class="solar-gradient-text italic font-medium">
                {{ range first 2 $words }}{{ . }} {{ end }}
            </span><br>

            {{ range after 2 $words }}{{ . }} {{ end }}
        </h2>
        {{ end }}
    </div>
   <div class="grid grid-cols-1 md:grid-cols-2 gap-4 py-10">
    {{ range  .services }}
    <div class="reveal glass-card rounded-[1.5rem] flex flex-col relative overflow-hidden transition-all duration-500 hover:shadow-xl hover:shadow-amber-500/5">
        
        <!-- Ефект світіння (Glow) -->
        <div class="absolute -top-10 -left-10 w-32 h-32 rounded-full pointer-events-none" 
            style="background: radial-gradient(circle, rgba(251, 191, 36, 0.22) 0%, transparent 70%)">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 flex-1">
        <!-- Текстовий блок -->
        <div class="p-7 flex flex-col gap-2">
            
            <h3 class="text-[15px] font-bold text-gray-900 leading-snug tracking-tight">
            {{ .title }}
            </h3>
            
            <p class="text-[13px] font-light text-gray-500 leading-relaxed flex-1 mb-3">
            {{ .description }}
            </p>

            <a href="{{ .link | relURL }}" class="text-[11px] font-bold border-b border-gray-200 pb-1 w-fit hover:border-amber-500 hover:text-amber-600 transition-colors">
            Докладніше
            </a>
        </div>

        <!-- Блок зображення -->
        <div class="relative overflow-hidden min-h-[200px]">
            <div class="w-full h-full flex items-center justify-center bg-slate-800 section-image" style="min-height: 250px;">
                <img src="{{ .image | relURL }}" alt="{{ .title }}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
            </div>
        </div>
        </div>
    </div>
    {{ end }}
    </div>

    </div>
    </section>
