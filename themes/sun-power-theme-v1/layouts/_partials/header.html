<header class="fixed top-0 w-full z-50 px-4 md:px-6 py-4" x-data="{ mobileMenuOpen: false }">
    <nav class="max-w-7xl mx-auto glass-panel rounded-full px-6 md:px-8 py-3 flex items-center justify-between transition-all" style="    z-index: 1000;
    position: relative;">
        
        <div class="flex items-center gap-2 relative z-[60]">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-amber-400 to-yellow-200 shadow-inner"></div>
            <a class="text-xl font-medium tracking-tight" href="/">
                {{ .Site.Params.brandName | default "A100" }}
            </a>
        </div>

        <div class="hidden lg:block">
            {{ partial "menu.html" (dict "menuID" "main" "page" . "isMobile" false) }}
        </div>

        <div class="flex items-center gap-4">
            <a href="tel:{{ .Site.Params.phone | default "+380000000000" }}" 
   class="bg-gray-900 text-white p-2.5 md:px-6 md:py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition-all shadow-lg shadow-gray-200 relative z-[60] flex items-center justify-center shrink-0">
    
    <span class="md:hidden flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="phone" class="w-5 h-5">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
    </span>

    <span class="hidden md:block">
        {{ .Site.Params.headerButtonText }}
    </span>
</a>

            <button 
                @click="mobileMenuOpen = !mobileMenuOpen"
                class="lg:hidden p-2 text-gray-600 hover:text-amber-500 transition-colors relative z-[60]"
                aria-label="Toggle menu"
            >
                <svg x-show="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <svg x-show="mobileMenuOpen" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
    </nav>

    <div 
        x-show="mobileMenuOpen" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-[-20px]"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-[-20px]"
        x-cloak
        class="fixed inset-0 z-50 lg:hidden bg-white/95 backdrop-blur-xl px-6 pt-32 pb-10 overflow-y-auto"
    >
        <div class="mx-auto">
            {{ partial "menu.html" (dict "menuID" "main" "page" . "isMobile" true) }}
        </div>
    </div>
</header>
