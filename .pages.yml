media:
  input: static/images
  output: /images

content:
  
  - name: sps
    label: "CEC сторінки"
    type: collection
    path: "content/sps"
    filename: "{slug}.md"
    fields:
      - { name: title, label: "Title", type: string }
      - { name: short_title, label: "Short title", type: string }
      - { name: label, label: "Label", type: string }
      - { name: description, label: "Description", type: text }
      - { name: price_from, label: "Price from", type: string }
      - { name: price, label: "Price", type: string }
      - { name: currency, label: "Currency", type: string }
      - { name: efficiency, label: "Efficiency", type: string }
      - { name: rating, label: "Rating", type: string }
      - { name: attribute_1, label: "Attribute 1", type: string }
      - { name: attribute_2, label: "Attribute 2", type: string }
      - { name: attribute_3, label: "Attribute 3", type: string }
      - { name: image, label: "Main image", type: image }
      - { name: image_alt, label: "Image alt", type: string }
      - { name: image_left, label: "Show Main image on the Page?", type: boolean, default: true }
      - { name: main_button_text, label: "Main button Text", type: text }
      - { name: specs_button_text, label: "Specs button Text", type: text }
      # FEATURES
      - name: features
        label: "Top features"
        type: object
        list:
          collapsible:
              collapsed: true
              summary: "{title}"
        fields:
          - { name: title, label: "Title", type: string }
          - { name: text, label: "Text", type: text }
          - { name: icon, label: "Icon", type: string }
          - { name: color, label: "Color", type: string }

      # SECTIONS
      - name: sections
        label: "Sections"
        type: block
        list:
          collapsible:
              collapsed: true
              summary: "{title}"
        blockKey: type
        blocks: 
          - name: text-with-image
            label: "Text with image"
            fields: # Використовуй fields замість items
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }

              - name: image_left
                label: "Image on the left?"
                type: boolean
                default: false
             
              - name: body_text
                label: "Text"
                type: rich-text

          - name: features-row
            label: "Features row"
            fields:
              - { name: title, label: "Title", type: string }
             
              - name: steps
                label: "Features"
                type: object
                list: true
                fields:
                  - { name: title, label: "Title", type: string }
                  - { name: subtitle, label: "Subtitle", type: string }
                  - { name: text, label: "Text", type: text }
           
          - name: case-specs
            label: "Case Specs"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: subtitle, label: "SubTitle", type: string }
              - name: specs
                label: "Specs"
                type: object
                list: true
                fields:
                   - { name: label, label: "Label", type: string }
                   - { name: value, label: "Value", type: text }
              
          - name: system-specs
            label: "System specs"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: button_text, label: "Button", type: string }
              - name: specs
                label: "Specs"
                type: object
                list: true
                fields:
                  - { name: label, label: "Label", type: string }
                  - { name: value, label: "Value", type: string }
              - { name: composition_title, label: "Comp Title", type: string }
              - name: composition_list
                label: "Список обладнання"
                type: object
                list: true
                fields:
                  - name: item
                    label: Пункт
                    type: text
                
              - name: installation_label 
                label: "Inst Label"
                type: string
              - name: installation_text
                label: "Inst Text"
                type: text


          - name: steps-list
            label: "Steps list"
            fields:
              - { name: title, label: "Title", type: string }
              - name: steps
                label: "Steps"
                type: object
                list: true
                fields:
                  - { name: title, label: "Title", type: string }
                  - { name: text, label: "Text", type: text }

          - name: features-grid
            label: "Features grid"
            fields:
              - { name: id, label: "ID", type: string }
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }
              - name: features
                label: "Features"
                type: object
                list: true
                fields:
                  - { name: title, type: string }
                  - { name: subtitle, type: string }
                  - { name: icon, type: string }
                  - { name: bg, type: string }
                  - { name: text, type: string }

          - name: faq
            label: "FAQ"
            fields:
              - { name: title, label: "Title", type: string }
              - name: items # Тут 'items' можна залишити як назву поля, але тип - list
                label: "Questions"
                type: object
                list: true
                fields:
                  - { name: question, label: "Q", type: string }
                  - { name: answer, label: "A", type: rich-text }

          - name: full-text-with-button
            label: "Full text CTA"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: content, label: "Content", type: rich-text }
              - { name: button_text, label: "Button", type: string }
          - name: seo-modal
            label: "SEO Modal"
            fields:
              - { name: button_text, label: "Button Text", type: string }
              - { name: seo_text, label: "Text", type: rich-text }

  - name: services
    label: "Послуги"
    type: collection
    path: "content/services"
    filename: "{slug}.md"
    fields:
      - { label: "Повний заголовок (H1)", name: "title", type: "string" }
      - { label: "Короткий заголовок", name: "short_title", type: "string" }
      - { label: "Мітка (Label)", name: "label", type: "string" }
      - { label: "SEO Опис", name: "description", type: "text" }
      - { label: "Примітка (Note)", name: "note", type: "string" }
      - { label: "Головне зображення", name: "image", type: "image" }
      - { label: "Alt-текст зображення", name: "image_alt", type: "string" }
      
      - name: sections
        label: "Sections"
        type: block
        list:
          collapsible:
              collapsed: true
              summary: "{title}"
        blockKey: type
        blocks: 
          - name: text-with-image
            label: "Text with image"
            fields: # Використовуй fields замість items
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }

              - name: image_left
                label: "Image on the left?"
                type: boolean
                default: false
             
              - name: body_text
                label: "Text"
                type: rich-text
                
          - name: service-process
            label: "Service Process"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: subtitle, label: "Subtitle", type: string }
              - { name: result_title, label: "Result Title", type: string }
              - { name: result_subtitle, label: "Result Subtitle", type: string }
              
              - name: steps
                label: "Етапи роботи"
                type: object
                list: true
                fields:
                  - { name: title, label: "Заголовок етапу", type: string }
                  - { name: text, label: "Опис етапу", type: text }

              - name: comparison_negative
                label: "Негативне порівняння"
                type: object
                fields:
                  - { name: label, label: "Мітка (Label)", type: string }
                  - { name: text, label: "Текст", type: text }

              - name: comparison_positive
                label: "Позитивне порівняння (A100)"
                type: object
                fields:
                  - { name: label, label: "Мітка (Label)", type: string }
                  - { name: text, label: "Текст", type: text }
                  
          - name: audit
            label: "Audit / Situations"
            fields:
              - { name: title, label: "Заголовок", type: string }
              - { name: description, label: "Опис", type: text }
              
              - name: situations
                label: "Сценарії (Situations)"
                type: object
                list: true
                fields:
                  - { name: title, label: "Заголовок сценарію", type: string }
                  - { name: text, label: "Опис сценарію", type: text }

              - { name: checklist_title, label: "Заголовок списку робіт", type: string }
              
              - name: documentation
                label: "Склад робіт (Checklist)"
                type: object
                list: true
                
                fields:
                  - { name: item, label: "Пункт робіт", type: text }

              - name: tags
                label: "Переваги (Tags)"
                type: object
                list: true
                fields:
                  - { name: item, label: "Тег", type: string }

              - { name: cta_text, label: "Текст кнопки (CTA)", type: string }

          - name: featured-levels
            label: "Тарифи та формати робіт"
            fields:
              - { name: title, label: "Заголовок секції", type: string }
              
              - name: tiers
                label: "Варіанти послуг (Tiers)"
                type: object
                list: true
                fields:
                  - { name: label, label: "Мітка (напр. Базовий)", type: string }
                  - { name: name, label: "Назва формату", type: string }
                  - { name: description, label: "Опис", type: text }
                  - { name: featured, label: "Акцентна картка (True/False)", type: boolean }
                  - { name: cta, label: "Текст кнопки", type: string }
                  
                  - name: params
                    label: "Технічні деталі (Параметри)"
                    type: object
                    list: true
                    fields:
                      - { name: key, label: "Параметр (напр. Термін)", type: string }
                      - { name: value, label: "Значення", type: string }
                      
          - name: full-text-with-button
            label: "Full text CTA"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: content, label: "Content", type: rich-text }
              - { name: button_text, label: "Button", type: string }

          - name: faq
            label: "FAQ"
            fields:
              - { name: title, label: "Title", type: string }
              - name: items # Тут 'items' можна залишити як назву поля, але тип - list
                label: "Questions"
                type: object
                list: true
                fields:
                  - { name: question, label: "Q", type: string }
                  - { name: answer, label: "A", type: rich-text }
          - name: steps-list
            label: "Список етапів (Steps)"
            fields:
              - { name: title, label: "Заголовок секції", type: string }
              
              - name: steps
                label: "Кроки процесу"
                type: object
                list: true
                fields:
                  - { name: title, label: "Назва кроку", type: string }
                  - { name: text, label: "Опис кроку", type: text }

  - name: projects
    label: "Наші роботи"
    type: collection
    path: "content/projects"
    filename: "{slug}.md"
    fields:
      - { label: "Назва проєкту (H1)", name: "title", type: "string" }
      - { label: "Коротка назва", name: "short_title", type: "string" }
      - { label: "Мітка потужності", name: "power_label", type: "string" }
      - { label: "Категорія", name: "category", type: "string" }
      - { label: "Локація", name: "location", type: "string" }
      - { label: "Головне фото", name: "image", type: "image" }
      - { label: "Посилання", name: "link", type: "string" }
    
      # Блок статистики (3 головні картки)
      - label: "Головна статистика (stats)"
        name: "stats"
        type: object
        list:
          collapsible:
              collapsed: true
              summary: "{label}"
        fields:
          - { label: "Заголовок", name: "label", type: "string" }
          - { label: "Значення", name: "value", type: "string" }
          - { label: "Опис (підтекст)", name: "subtext", type: "string" }
          - { label: "Іконка (напр. battery, sun)", name: "icon", type: "string" }
    
      # Блок Задача / Результат
      - label: "Місія проєкту (Mission)"
        name: "mission"
        type: object
        fields:
          - { label: "Задача", name: "task", type: "text" }
          - { label: "Результат", name: "result", type: "text" }
    
      # Таблиця параметрів
      - label: "Таблиця параметрів (parameters)"
        name: "parameters"
        type: object
        list:
          collapsible:
              collapsed: true
              summary: "{key}"
        fields:
          - { label: "Ключ (Параметр)", name: "key", type: "string" }
          - { label: "Значення", name: "val", type: "string" }
    
      # Склад системи
      - label: "Склад системи (components)"
        name: "components"
        type: object
        list:
          collapsible:
              collapsed: true
              summary: "{name}"
        fields:
          - { label: "Назва пристрою", name: "name", type: "string" }
          - { label: "Опис/Характеристики", name: "desc", type: "string" }
          - { label: "Кількість", name: "qty", type: "string" }
    
      # Відгук клієнта
      - label: "Відгук (Testimonial)"
        name: "testimonial"
        type: object
        fields:
          - { label: "Текст відгуку", name: "text", type: "text" }
          - { label: "Автор", name: "author", type: "string" }
          - { label: "Посада/Роль", name: "role", type: "string" }
          - { label: "Ініціали", name: "initials", type: "string" }


  - name: home
    label: "Головна сторінка"
    type: file
    path: "content/_index.md" 
    fields:
      - { label: "SEO Title", name: "title", type: "string" }
      - name: sections
        label: "Конструктор сторінки"
        type: block
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        blockKey: type
        blocks:
          # --- HERO SECTION ---
          - name: hero
            label: "Hero блок"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: badge, label: "Badge", type: string }
              - { name: body_text, label: "Text", type: text }
              - name: images
                label: "Слайдер зображень"
                type: object
                list: true
                fields:
                  - { name: item, label: "Image", type: image }
              - { name: primary_btn, label: "Primary Button", type: string }
              - { name: secondary_btn, label: "Secondary Button", type: string }
          - name: top-solutions
            label: "Топ рішення"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: description, label: "Description", type: text }
              - name: products
                label: "Товари"
                type: object
                list: true
                fields:
                  - { name: label, label: "Label (напр. Базовий)", type: string }
                  - { name: title, label: "Назва станції", type: string }
                  - { name: subtitle, label: "Підзаголовок", type: string }
                  - { name: price, label: "Ціна ($)", type: string }
                  - { name: description, label: "Опис", type: text }
                  - { name: featured, label: "Акцентна картка", type: boolean }
                  - { name: badge, label: "Badge (Популярне)", type: string }
                  - name: equipment
                    label: "Комплектація"
                    type: object
                    list: true
                    fields:
                      - { name: item, label: "Пункт", type: string }
          - name: featured-sps
            label: "Категорії рішень (SPS)"
            fields:
              - { name: title, label: "Title", type: string }
              - name: cards
                label: "Картки категорій"
                type: object
                list: true
                fields:
                  - { name: label, label: "Верхня мітка", type: string }
                  - { name: title, label: "Заголовок", type: string }
                  - { name: image, label: "Фото", type: image }
                  - { name: description, label: "Опис", type: text }
                  - { name: badge, label: "Badge", type: string }
                  - { name: link, label: "Link", type: string }
                  - name: specs
                    label: "Характеристики"
                    type: object
                    list: true
                    fields:
                      - { name: key, label: "Назва", type: string }
                      - { name: value, label: "Значення", type: string }

          - name: featured-services
            label: "Наші послуги"
            fields:
              - { name: title, label: "Title", type: string }
              - name: services
                label: "Список послуг"
                type: object
                list: true
                fields:
                  - { name: number, label: "№", type: string }
                  - { name: title, label: "Назва", type: string }
                  - { name: description, label: "Опис", type: text }
                  - { name: image, label: "Фото", type: image }
                  - { name: link, label: "Link", type: string }

          - name: cost-calculate
            label: "Калькулятор"
            fields:
              - { name: title, label: "Заголовок", type: string }
              - { name: description, label: "Опис", type: text }
              - name: questions
                label: "Питання"
                type: object
                list: true
                fields:
                  - { name: label, label: "Заголовок питання", type: string }
                  - name: options
                    label: "Варіанти"
                    type: object
                    list: true
                    fields:
                      - { name: text, label: "Текст відповіді", type: string }
                      - { name: default, label: "Обрано за замовчуванням", type: boolean }
              - { name: primary_btn, label: "Main Button", type: string }
              - name: footer_tags
                label: "Теги внизу"
                type: object
                list: true
                fields: [{ name: item, label: "Tag", type: string }]

          # --- PAYMENT & DELIVERY ---
          - name: payment-delivery
            label: "Оплата та доставка"
            fields:
              - { name: title, label: "Заголовок", type: string }
              - { name: description, label: "Опис", type: text }
              - name: cards
                label: "Картки умов"
                type: object
                list: true
                fields:
                  - { name: title, label: "Заголовок", type: string }
                  - { name: icon, label: "Icon Name", type: string }
                  - { name: featured, label: "Виділити", type: boolean }
                  - name: items
                    label: "Пункти"
                    type: object
                    list: true
                    fields:
                      - { name: subtitle, label: "Підзаголовок", type: string }
                      - { name: text, label: "Опис", type: text }

          # --- TEXT WITH IMAGE ---
          - name: text-with-image
            label: "Text with image"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }
              - { name: image_left, label: "Image on the left?", type: boolean, default: false }
              - { name: body_text, label: "Text", type: rich-text }

          # --- PROJECTS ---
          - name: featured-projects
            label: "Останні проєкти (Авто)"
            fields:
              - { name: title, label: "Title", type: string }

          # --- FAQ ---
          - name: faq
            label: "FAQ"
            fields:
              - { name: title, label: "Title", type: string }
              - name: items
                label: "Questions"
                type: object
                list: true
                fields:
                  - { name: question, label: "Q", type: string }
                  - { name: answer, label: "A", type: rich-text }
      
     