media_path: ""
public_path: ""
content:
  - name: "home"
    label: "Home Sections"
    type: "collection"
    path: "content/home"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "type"
        label: "Section Type"
        type: "select"
        options:
          - "hero"
          - "top-solutions"
          - "featured-sps"
          - "featured-technologies"
          - "featured-services"
          - "text-with-image"
          - "featured-projects"
          - "cost-calculate"
          - "payment-delivery"
          - "certificates"
          - "faq"
      - name: "weight"
        label: "Weight"
        type: "number"
      - name: "badge"
        label: "Badge"
        type: "string"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "id"
        label: "Section ID"
        type: "string"
      - name: "image_position"
        label: "Image Position"
        type: "select"
        options:
          - "left"
          - "right"
      - name: "image"
        label: "Image"
        type: "image"
      - name: "images"
        label: "Images Array"
        type: "list"
        field:
          name: "image"
          label: "Image"
          type: "image"
      - name: "image_alt"
        label: "Image Alt"
        type: "string"
      - name: "primary_btn"
        label: "Primary Button"
        type: "string"
      - name: "secondary_btn"
        label: "Secondary Button"
        type: "string"
      - name: "button_text"
        label: "Button Text"
        type: "string"
      - name: "body_text"
        label: "Body Text"
        type: "rich-text"
      - name: "body"
        label: "Content"
        type: "rich-text"
      - name: "cards"
        label: "Cards"
        type: "list"
        fields:
          - name: "title"
            label: "Title"
            type: "string"
          - name: "icon"
            label: "Icon"
            type: "string"
          - name: "featured"
            label: "Featured"
            type: "boolean"
          - name: "badge"
            label: "Badge"
            type: "string"
          - name: "items"
            label: "Card Items"
            type: "list"
            fields:
              - name: "subtitle"
                label: "Subtitle"
                type: "string"
              - name: "text"
                label: "Text"
                type: "rich-text"
      - name: "items"
        label: "List Items (FAQ)"
        type: "list"
        fields:
          - name: "question"
            label: "Question"
            type: "string"
          - name: "answer"
            label: "Answer"
            type: "rich-text"

   