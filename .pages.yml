media:
  input: static/images
  output: /images

content:
  - name: sps
    label: "CEC сторінки"
    type: collection
    path: "content/sps"
    media_folder: "static/images/sps"      # Порожньо означає "в тій же папці, де .md"
    public_folder: "/images/sps"     # Порожньо означає відносний шлях у самому коді
    filename: "{slug}.md"
    fields:
      - { name: title, label: "Title", type: string }
      - { name: short_title, label: "Short title", type: string }
      - { name: label, label: "Label", type: string }
      - { name: description, label: "Description", type: text }
      - { name: layout, label: "Layout", type: hidden, default: "sps" }
      - { name: price_from, label: "Price from", type: string }
      - { name: price, label: "Price", type: string }
      - { name: currency, label: "Currency", type: string }
      - { name: efficiency, label: "Efficiency", type: string }
      - { name: rating, label: "Rating", type: string }
      - { name: attribute_1, label: "Attribute 1", type: string }
      - { name: attribute_2, label: "Attribute 2", type: string }
      - { name: attribute_3, label: "Attribute 3", type: string }
      - { name: image, label: "Main image", type: image }
      - { name: image_alt, label: "Image alt", type: string }

      # FEATURES
      - name: features
        label: "Top features"
        type: object
        list:
          collapsible:
              collapsed: true
              summary: "{title}"
        fields:
          - { name: title, label: "Title", type: string }
          - { name: text, label: "Text", type: text }
          - { name: icon, label: "Icon", type: string }
          - { name: color, label: "Color", type: string }

      # SECTIONS
      - name: sections
        label: "Sections"
        type: block
        list:
          collapsible:
              collapsed: true
              summary: "{label}"
        blockKey: type
        blocks: 
          - name: text-with-image
            label: "Text with image"
            fields: # Використовуй fields замість items
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }

              - name: image_left
                label: "Image on the left?"
                type: boolean
                default: false
             
              - name: body_text
                label: "Text"
                type: rich-text

          - name: system-specs
            label: "System specs"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: button_text, label: "Button", type: string }
              - name: specs
                label: "Specs"
                type: object
                list: true
                fields:
                  - { name: label, label: "Label", type: string }
                  - { name: value, label: "Value", type: string }
              - { name: composition_title, label: "Comp Title", type: string }
              - name: composition_list
                label: "Список обладнання"
                type: object
                list: true
                fields:
                  - name: item
                    label: Пункт
                    type: text
                
              - name: installation_label 
                label: "Inst Label"
                type: string
              - name: installation_text
                label: "Inst Text"
                type: text

          - name: steps-list
            label: "Steps list"
            fields:
              - { name: title, label: "Title", type: string }
              - name: steps
                label: "Steps"
                type: object
                list: true
                fields:
                  - { name: title, label: "Title", type: string }
                  - { name: text, label: "Text", type: text }

          - name: features-grid
            label: "Features grid"
            fields:
              - { name: id, label: "ID", type: string }
              - { name: title, label: "Title", type: string }
              - { name: image, label: "Image", type: image }
              - { name: image_alt, label: "Alt", type: string }
              - name: features
                label: "Features"
                type: object
                list: true
                fields:
                  - { name: title, type: string }
                  - { name: subtitle, type: string }
                  - { name: icon, type: string }
                  - { name: bg, type: string }
                  - { name: text, type: string }

          - name: faq
            label: "FAQ"
            fields:
              - { name: title, label: "Title", type: string }
              - name: items # Тут 'items' можна залишити як назву поля, але тип - list
                label: "Questions"
                type: object
                list: true
                fields:
                  - { name: question, label: "Q", type: string }
                  - { name: answer, label: "A", type: rich-text }

          - name: full-text-with-button
            label: "Full text CTA"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: content, label: "Content", type: rich-text }
              - { name: button_text, label: "Button", type: string }