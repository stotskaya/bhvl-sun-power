backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

content:
  - name: "home"
    label: "Головна сторінка"
    type: "collection"
    items:

      - name: "hero"
        label: "Hero"
        path: "content/home/01-hero/hero.md"
        fields:
          - { name: "title", label: "Title", type: "string" }
          - { name: "type", label: "Type", type: "string" }
          - { name: "weight", label: "Weight", type: "number" }
          - { name: "badge", label: "Badge", type: "string" }

          - name: "images"
            label: "Images"
            type: "list"
            field:
              name: "image"
              label: "Image"
              type: "image"

          - { name: "primary_btn", label: "Primary Button", type: "string" }
          - { name: "secondary_btn", label: "Secondary Button", type: "string" }
          - { name: "body", label: "Content", type: "markdown" }