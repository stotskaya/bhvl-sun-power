# pagecms.yml

label: "Автономна СЕС"
icon: "battery-charging"
file: "content/sps/autonomous-ses.md" # Шлях до вашого файлу

fields:
  - name: title
    label: "Заголовок сторінки (H1)"
    type: string
  - name: short_title
    label: "Коротка назва"
    type: string
  - name: label
    label: "Мітка"
    type: string
  - name: description
    label: "Опис (SEO)"
    type: textarea
  - name: layout
    label: "Шаблон (Layout)"
    type: hidden
    default: "sps"

  # Блок ціни та характеристик
  - name: price_settings
    label: "Ціна та статус"
    type: object
    fields:
      - name: price_from
        label: "Ціна 'від'"
        type: select
        options: ["yes", "no"]
      - name: price
        label: "Вартість"
        type: number
      - name: currency
        label: "Валюта"
        type: string
      - name: efficiency
        label: "Потужність/Ефективність"
        type: string
      - name: rating
        label: "Рейтинг/Гарантія"
        type: string

  # Атрибути (теги)
  - name: attributes
    label: "Основні переваги (теги)"
    type: object
    fields:
      - name: attribute_1
        type: string
      - name: attribute_2
        type: string
      - name: attribute_3
        type: string

  # Зображення прев'ю
  - name: image_settings
    label: "Головне зображення"
    type: object
    fields:
      - name: image
        label: "Шлях до файлу"
        type: image
      - name: image_alt
        label: "Alt текст"
        type: string

  # Переваги (Features)
  - name: features
    label: "Ключові особливості"
    type: list
    fields:
      - name: title
        type: string
      - name: text
        type: textarea
      - name: icon
        type: string
      - name: color
        type: select
        options: ["amber", "blue", "green", "red", "purple"]

  # Конструктор секцій (Blocks)
  - name: sections
    label: "Секції сторінки"
    type: list
    types:
      - name: text-with-image
        label: "Текст із зображенням"
        fields:
          - name: id
            type: string
          - name: title
            type: string
          - name: image
            type: image
          - name: image_alt
            type: string
          - name: image_position
            type: select
            options: ["left", "right"]
          - name: body_text
            label: "Контент (Markdown)"
            type: markdown

      - name: system-specs
        label: "Технічні характеристики системи"
        fields:
          - name: title
            type: string
          - name: button_text
            type: string
          - name: specs
            type: list
            fields:
              - name: label
                type: string
              - name: value
                type: string
          - name: composition_title
            type: string
          - name: composition_list
            type: list
            fields:
              - name: item
                type: string
          - name: installation_label
            type: string
          - name: installation_text
            type: string

      - name: steps-list
        label: "Етапи роботи"
        fields:
          - name: title
            type: string
          - name: steps
            type: list
            fields:
              - name: title
                type: string
              - name: text
                type: string

      - name: features-grid
        label: "Сітка переваг (Чому ми)"
        fields:
          - name: title
            type: string
          - name: image
            type: image
          - name: features
            type: list
            fields:
              - name: title
                type: string
              - name: subtitle
                type: string
              - name: icon
                type: string
              - name: bg
                type: string
              - name: text
                type: string

      - name: faq
        label: "Питання та відповіді"
        fields:
          - name: title
            type: string
          - name: items
            type: list
            fields:
              - name: question
                type: string
              - name: answer
                type: textarea

      - name: full-text-with-button
        label: "Заклик до дії (CTA)"
        fields:
          - name: title
            type: string
          - name: content
            type: markdown
          - name: button_text
            type: string