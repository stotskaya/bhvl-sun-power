media_folder: ""
public_folder: ""
content:
  - name: "home"
    label: "Home Sections"
    type: "collection"
    folder: "content/home"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "type"
        label: "Section Type"
        type: "select"
        options:
          - "hero"
          - "top-solutions"
          - "featured-sps"
          - "featured-technologies"
          - "featured-services"
          - "text-with-image"
          - "featured-projects"
          - "cost-calculate"
          - "payment-delivery"
          - "certificates"
          - "faq"
      - name: "weight"
        label: "Weight"
        type: "number"
      - name: "badge"
        label: "Badge"
        type: "string"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "id"
        label: "Section ID"
        type: "string"
      - name: "image_position"
        label: "Image Position"
        type: "select"
        options:
          - "left"
          - "right"
      - name: "image"
        label: "Image"
        type: "image"
      - name: "images"
        label: "Images Array"
        type: "list"
        field:
          name: "image"
          label: "Image"
          type: "image"
      - name: "image_alt"
        label: "Image Alt"
        type: "string"
      - name: "primary_btn"
        label: "Primary Button"
        type: "string"
      - name: "secondary_btn"
        label: "Secondary Button"
        type: "string"
      - name: "button_text"
        label: "Button Text"
        type: "string"
      - name: "body_text"
        label: "Body Text"
        type: "rich-text"
      - name: "body"
        label: "Content"
        type: "rich-text"
      - name: "cards"
        label: "Cards"
        type: "list"
        fields:
          - name: "title"
            label: "Title"
            type: "string"
          - name: "icon"
            label: "Icon"
            type: "string"
          - name: "featured"
            label: "Featured"
            type: "boolean"
          - name: "badge"
            label: "Badge"
            type: "string"
          - name: "items"
            label: "Card Items"
            type: "list"
            fields:
              - name: "subtitle"
                label: "Subtitle"
                type: "string"
              - name: "text"
                label: "Text"
                type: "rich-text"
      - name: "items"
        label: "List Items (FAQ)"
        type: "list"
        fields:
          - name: "question"
            label: "Question"
            type: "string"
          - name: "answer"
            label: "Answer"
            type: "rich-text"

  - name: "services"
    label: "Services"
    type: "collection"
    folder: "content/services"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "short_title"
        label: "Short Title"
        type: "string"
      - name: "label"
        label: "Label"
        type: "string"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "note"
        label: "Note"
        type: "string"
      - name: "image"
        label: "Cover Image"
        type: "image"
      - name: "image_alt"
        label: "Image Alt"
        type: "string"
      - name: "sections"
        label: "Page Sections"
        type: "list"
        fields:
          - name: "type"
            label: "Section Type"
            type: "select"
            options:
              - "text-with-image"
              - "service-process"
              - "audit"
              - "featured-levels"
              - "steps-list"
              - "full-text-with-button"
              - "faq"
          - name: "id"
            label: "Section ID"
            type: "string"
          - name: "title"
            label: "Title"
            type: "string"
          - name: "subtitle"
            label: "Subtitle"
            type: "string"
          - name: "description"
            label: "Description"
            type: "string"
          - name: "image_position"
            label: "Image Position"
            type: "select"
            options:
              - "left"
              - "right"
          - name: "image"
            label: "Image"
            type: "image"
          - name: "image_alt"
            label: "Image Alt"
            type: "string"
          - name: "body_text"
            label: "Body Text"
            type: "rich-text"
          - name: "content"
            label: "Content"
            type: "rich-text"
          - name: "button_text"
            label: "Button Text"
            type: "string"
          - name: "cta_text"
            label: "CTA Text"
            type: "string"
          - name: "result_title"
            label: "Result Title"
            type: "string"
          - name: "result_subtitle"
            label: "Result Subtitle"
            type: "string"
          - name: "steps"
            label: "Steps"
            type: "list"
            fields:
              - name: "title"
                label: "Title"
                type: "string"
              - name: "text"
                label: "Text"
                type: "rich-text"
          - name: "situations"
            label: "Situations"
            type: "list"
            fields:
              - name: "title"
                label: "Title"
                type: "string"
              - name: "text"
                label: "Text"
                type: "rich-text"
          - name: "documentation"
            label: "Documentation List"
            type: "list"
            field:
              name: "item"
              label: "Item"
              type: "string"
          - name: "tags"
            label: "Tags"
            type: "list"
            field:
              name: "tag"
              label: "Tag"
              type: "string"
          - name: "tiers"
            label: "Tiers"
            type: "list"
            fields:
              - name: "label"
                label: "Label"
                type: "string"
              - name: "name"
                label: "Name"
                type: "string"
              - name: "description"
                label: "Description"
                type: "string"
              - name: "featured"
                label: "Featured"
                type: "boolean"
              - name: "cta"
                label: "CTA"
                type: "string"
              - name: "params"
                label: "Params"
                type: "list"
                fields:
                  - name: "key"
                    label: "Key"
                    type: "string"
                  - name: "value"
                    label: "Value"
                    type: "string"
          - name: "items"
            label: "FAQ Items"
            type: "list"
            fields:
              - name: "question"
                label: "Question"
                type: "string"
              - name: "answer"
                label: "Answer"
                type: "rich-text"

  - name: "projects"
    label: "Projects"
    type: "collection"
    folder: "content/projects"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "cover"
        label: "Cover Image"
        type: "image"
      - name: "sections"
        label: "Page Sections"
        type: "list"
        fields:
          - name: "type"
            label: "Section Type"
            type: "string"
          - name: "title"
            label: "Title"
            type: "string"
          - name: "body_text"
            label: "Body Text"
            type: "rich-text"
          - name: "image"
            label: "Image"
            type: "image"

  - name: "sps"
    label: "Solar Power Stations"
    type: "collection"
    folder: "content/sps"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "cover"
        label: "Cover Image"
        type: "image"
      - name: "sections"
        label: "Page Sections"
        type: "list"
        fields:
          - name: "type"
            label: "Section Type"
            type: "string"
          - name: "title"
            label: "Title"
            type: "string"
          - name: "body_text"
            label: "Body Text"
            type: "rich-text"
          - name: "image"
            label: "Image"
            type: "image"
          - name: "items"
            label: "Items"
            type: "list"
            fields:
              - name: "question"
                label: "Question"
                type: "string"
              - name: "answer"
                label: "Answer"
                type: "rich-text"

  - name: "journal"
    label: "Journal"
    type: "collection"
    folder: "content/journal"
    nested: true
    fields:
      - name: "title"
        label: "Title"
        type: "string"
      - name: "date"
        label: "Date"
        type: "date"
      - name: "description"
        label: "Description"
        type: "string"
      - name: "image"
        label: "Featured Image"
        type: "image"
      - name: "body"
        label: "Content"
        type: "rich-text"

  - name: "legal"
    label: "Legal Pages"
    type: "file"
    files:
      - name: "ethics"
        label: "Ethics"
        file: "content/ethics.md"
        fields:
          - name: "title"
            label: "Title"
            type: "string"
          - name: "body"
            label: "Content"
            type: "rich-text"
      - name: "privacy"
        label: "Privacy Policy"
        file: "content/privacy.md"
        fields:
          - name: "title"
            label: "Title"
            type: "string"
          - name: "body"
            label: "Content"
            type: "rich-text"
      - name: "terms"
        label: "Terms of Service"
        file: "content/terms.md"
        fields:
          - name: "title"
            label: "Title"
            type: "string"
          - name: "body"
            label: "Content"
            type: "rich-text"